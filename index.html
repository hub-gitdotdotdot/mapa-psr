<title>Mapa PSR — Informes Técnicos CNMP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:transparent; font-family:'Sora',system-ui,sans-serif; }

@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');

.psr-wrapper {
  max-width:860px; margin:0 auto;
  padding:1.4rem 1rem 1rem;
  background:linear-gradient(160deg,#f0f6fc 0%,#e8f2f9 100%);
  border-radius:18px;
}
.psr-titulo {
  font-size:15px; font-weight:700; color:#1a2e4a;
  text-align:center; margin:0 0 3px;
}
.psr-subtitulo {
  font-size:11px; color:#7a8a9a; text-align:center; margin:0 0 .9rem;
}
.psr-svg-container {
  position:relative; width:100%; max-width:700px; margin:0 auto;
}
.psr-svg-container svg { width:100%; height:auto; display:block; }

.psr-estado {
  fill:#b8d4ec; stroke:#fff; stroke-width:0.8;
  stroke-linejoin:round; cursor:pointer;
  transition:fill .18s ease, filter .18s ease;
}
.psr-estado:hover {
  fill:#2a7bbf;
  filter:drop-shadow(0 3px 8px rgba(42,123,191,.45));
}
.psr-estado.ativo {
  fill:#1a5c99;
  filter:drop-shadow(0 3px 8px rgba(26,92,153,.45));
}
.psr-label {
  font-family:'Sora',system-ui,sans-serif;
  font-weight:700; fill:#1a2e4a;
  pointer-events:none; user-select:none;
  text-anchor:middle;
}
.psr-tooltip {
  position:absolute; pointer-events:none;
  background:#1a2e4a; color:#fff;
  font-size:11px; font-weight:600;
  padding:5px 12px; border-radius:8px;
  white-space:nowrap; opacity:0;
  transition:opacity .12s;
  transform:translate(-50%,-120%);
  z-index:100; box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.psr-tooltip::after {
  content:''; position:absolute;
  top:100%; left:50%; transform:translateX(-50%);
  border:5px solid transparent; border-top-color:#1a2e4a;
}
.psr-tooltip.visivel { opacity:1; }

.psr-legenda {
  display:flex; align-items:center; justify-content:center;
  gap:18px; margin-top:.7rem; flex-wrap:wrap;
}
.psr-legenda-item {
  display:flex; align-items:center; gap:6px;
  font-size:10px; color:#7a8a9a;
}
.psr-legenda-cor {
  width:13px; height:13px; border-radius:3px;
  border:1px solid rgba(0,0,0,.08);
}

/* MODAL */
.psr-modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(10,20,40,.6); backdrop-filter:blur(4px);
  z-index:9999; align-items:center; justify-content:center; padding:1rem;
}
.psr-modal-overlay.aberto { display:flex; }
.psr-modal-box {
  background:#fff; border-radius:18px; padding:1.8rem;
  max-width:420px; width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,.22);
  position:relative;
  animation:psrIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes psrIn {
  from{ transform:scale(.88) translateY(14px); opacity:0; }
  to  { transform:scale(1) translateY(0);      opacity:1; }
}
.psr-modal-fechar {
  position:absolute; top:14px; right:16px;
  background:#f0f4f8; border:none;
  width:28px; height:28px; border-radius:50%;
  font-size:15px; cursor:pointer; color:#7a8a9a;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s,color .15s;
}
.psr-modal-fechar:hover { background:#e2e8f0; color:#1a2e4a; }
.psr-modal-nome {
  font-size:19px; font-weight:700; color:#1a2e4a;
  margin:0 0 5px; padding-right:2rem;
}
.psr-modal-regiao {
  font-size:10px; font-weight:600; color:#fff;
  background:linear-gradient(90deg,#2a7bbf,#1a5c99);
  display:inline-block; padding:3px 12px;
  border-radius:20px; margin-bottom:1.1rem;
}
.psr-modal-desc {
  font-size:12px; color:#7a8a9a; margin:0 0 1rem; line-height:1.6;
}
.psr-modal-links { display:flex; flex-direction:column; gap:9px; }
.psr-btn {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 15px; border-radius:11px;
  text-decoration:none; font-size:13px; font-weight:600;
  transition:transform .14s,box-shadow .14s;
  border:1.5px solid transparent;
}
.psr-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.12); }
.psr-btn-2023 { background:#eaf3fb; color:#1a5c99; border-color:#b5d4f4; }
.psr-btn-2024 { background:#e8f6f1; color:#0f6e56; border-color:#9fe1cb; }
.psr-btn-2025 { background:#fef5e7; color:#854f0b; border-color:#fac775; }
.psr-btn svg  { width:15px; height:15px; flex-shrink:0; opacity:.7; }
</style>

    "Espírito Santo":     {r:"Sudeste",      l23:"informe-tecnico-espirito-santo.html",      l24:"2024/informe-tecnico-Espirito-santo-2024.html",       l25:"2025/informe-tecnico-EspiritoSanto2025.html"},
    "Minas Gerais":       {r:"Sudeste",      l23:"informe-tecnico-minas-gerais.html",        l24:"2024/informe-tecnico-Minas-Gerais-2024.html",         l25:"2025/informe-tecnico-MinasGerais2025.html"},
    "Rio de Janeiro":     {r:"Sudeste",      l23:"informe-tecnico-rio-de-janeiro.html",      l24:"2024/informe-tecnico-Rio-de-Janeiro-2024.html",       l25:"2025/informe-tecnico-RioDeJaneiro2025.html"},
    "São Paulo":          {r:"Sudeste",      l23:"informe-tecnico-sao-paulo.html",           l24:"2024/informe-tecnico-Sao-Paulo-2024.html",            l25:"2025/informe-tecnico-SaoPaulo2025.html"},
    "Paraná":             {r:"Sul",          l23:"informe-tecnico-parana.html",              l24:"2024/informe-tecnico-Parana2024.html",                l25:"2025/informe-tecnico-Parana2025.html"},
    "Rio Grande do Sul":  {r:"Sul",          l23:"informe-tecnico-rio-grande-do-sul.html",   l24:"2024/informe-tecnico-rio-grande-do-sul-2024.html",    l25:"2025/informe-tecnico-RioGrandeDoSul2025.html"},
    "Santa Catarina":     {r:"Sul",          l23:"informe-tecnico-santa-catarina.html",      l24:"2024/informe-tecnico-Santa-Catarina-2024.html",       l25:"2025/informe-tecnico-SantaCatarina2025.html"}
  };

  var overlay=document.getElementById('psrOverlay');
  var elNome =document.getElementById('psrNome');
  var elReg  =document.getElementById('psrRegiao');
  var elLinks=document.getElementById('psrLinks');
  var tooltip=document.getElementById('psrTooltip');
  var cont   =document.getElementById('psrContainer');

  function abrir(estado){
    var d=informes[estado]; if(!d) return;
    document.querySelectorAll('.psr-estado').forEach(function(p){p.classList.remove('ativo');});
    var el=document.querySelector('[data-estado="'+estado+'"]');
    if(el) el.classList.add('ativo');
    elNome.textContent=estado;
    elReg.textContent =d.r;
    elLinks.innerHTML=[
      {ano:'2023',url:BASE+d.l23,cls:'psr-btn-2023'},
      {ano:'2024',url:BASE+d.l24,cls:'psr-btn-2024'},
      {ano:'2025',url:BASE+d.l25,cls:'psr-btn-2025'}
    ].map(function(a){
      return '<a href="'+a.url+'" target="_blank" rel="noopener" class="psr-btn '+a.cls+'">'
            +'<span>Informe Técnico '+a.ano+'</span>'
            +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'
            +'<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>'
            +'<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'
            +'</svg></a>';
    }).join('');
    overlay.classList.add('aberto');
  }

  function fechar(){
    overlay.classList.remove('aberto');
    document.querySelectorAll('.psr-estado').forEach(function(p){p.classList.remove('ativo');});
  }

  document.querySelectorAll('.psr-estado').forEach(function(p){
    p.addEventListener('click',function(){ abrir(this.dataset.estado); });
    p.addEventListener('mouseenter',function(){
      tooltip.textContent=this.dataset.estado;
      tooltip.classList.add('visivel');
    });
    p.addEventListener('mousemove',function(e){
      var r=cont.getBoundingClientRect();
      tooltip.style.left=(e.clientX-r.left)+'px';
      tooltip.style.top =(e.clientY-r.top-8)+'px';
    });
    p.addEventListener('mouseleave',function(){ tooltip.classList.remove('visivel'); });
  });

  document.getElementById('psrFechar').addEventListener('click',fechar);
  overlay.addEventListener('click',function(e){ if(e.target===overlay) fechar(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') fechar(); });
})();
</script>
</body>
